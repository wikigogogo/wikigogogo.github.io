<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目详情</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="container">

    <!-- 返回导航 -->
    <nav class="back-nav">
      <a href="index.html">&larr; 返回项目列表</a>
    </nav>

    <!-- 项目头部 -->
    <div class="project-header" id="projectHeader">
      <div class="category-line">
        <span class="card-category"></span>
      </div>
      <h1 class="project-title"></h1>
      <p class="description"></p>
    </div>

    <!-- PDF 区域 -->
    <section id="pdfSection" class="asset-section" style="display: none;">
      <h2 class="section-title"><span class="section-icon">&#128196;</span> 工程图纸</h2>
      <div class="pdf-tabs" id="pdfTabs"></div>
      <div class="pdf-viewer-wrapper">
        <div class="pdf-toolbar">
          <button id="pdfFullscreen" class="pdf-btn" title="全屏查看">&#x26F6; 全屏</button>
        </div>
        <iframe id="pdfFrame" class="pdf-iframe" src="" allowfullscreen></iframe>
      </div>
    </section>

    <!-- 视频区域 -->
    <section id="videoSection" class="asset-section" style="display: none;">
      <h2 class="section-title"><span class="section-icon">&#127910;</span> 演示视频</h2>
      <div class="video-wrapper" id="videoContainer"></div>
    </section>

    <!-- 图片区域 -->
    <section id="imageSection" class="asset-section" style="display: none;">
      <h2 class="section-title"><span class="section-icon">&#128247;</span> 项目图片</h2>
      <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <!-- 相关项目 -->
    <section id="relatedSection" class="related-section" style="display: none;">
      <h2>相关项目</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </section>

    <!-- 页脚 -->
    <footer class="site-footer">
      <p>&copy; 2026 郭玮骐 &middot; 个人项目展示</p>
    </footer>

  </div>

  <!-- Lightbox 弹层（放在 container 外面，确保全屏覆盖） -->
  <div id="lightbox" class="lightbox-overlay">
    <div class="lightbox-inner">
      <img class="lightbox-img" src="" alt="">
      <button class="lightbox-prev" type="button">&larr;</button>
      <button class="lightbox-next" type="button">&rarr;</button>
      <button class="lightbox-close" type="button">&times;</button>
      <div class="lightbox-caption"></div>
    </div>
  </div>

  <!-- 项目脚本 -->
  <script src="assets/js/projects-data.js?v=4"></script>
  <script src="assets/js/theme.js?v=4"></script>
  <script src="assets/js/gallery.js?v=4"></script>
  <script src="assets/js/project-detail.js?v=4"></script>

</body>
</html>
